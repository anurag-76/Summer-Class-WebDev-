<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORM</title>
    <h1>User Registration</h1>
    <form action="">
      <fieldset>
        <legend>Personal Details</legend>
        <label for="">First Name: <input type="text" /></label><br />
        <label for="">Last Name: <input type="text" /></label><br />
        <label for="">Age: <input type="number" /></label><br />
        <label for="gender">Gender: </label>
        <select name="" id="">
          <option value="m">Male</option>
          <option value="f">Female</option>
          <option value="o">Other</option></select
        ><br />
        <label for="pp">Profile Picture: <input type="file" /></label>
      </fieldset>

      <fieldset>
        <legend>Account Details</legend>
        <label for="email">Email: <input type="text" /></label><br />
        <label for="pass">Password: <input type="password" /></label><br />
        <label for="role">Role: </label>
        <input type="radio" value="Admin" name="role" />
        <label for="">Admin</label>
        <input type="radio" value="User" checked name="role" />
        <label for="">User</label><br />
        <input type="checkbox" />
        <label for="">I agree to the terms and conditions</label><br />
        <button style="padding: 3px 5px;">Register</button>
        <button style="padding: 3px 8px;">Reset</button><br /><br />
        <label for="">© 2024 My Todo List. All rights reserved.</label>
      </fieldset>
    </form>
  </head>
  <body></body>
</html>
